# ============================================================
# RESOURCES  (guidance, organisations, datasets/tools, methods)
# ------------------------------------------------------------
# Chairs: add a resource by copying a block and editing it.
# The `section` field decides which group it appears under on the
# Resources page. Allowed sections (and their display order) are
# set in resources.md: guidance, organisations, datasets, methods.
#
# Fields:
#   type     : always "resource"   (drives the Latest feed + badge)
#   section  : guidance | organisations | datasets | methods
#   title    : resource title
#   org      : publisher / author / host  (optional)
#   date     : YYYY-MM-DD  (used for ordering; "" for templates)
#   year     : display year (optional; falls back to date's year)
#   link     : URL to the resource
#   checklist_link : URL to an accompanying checklist/table (optional)
#   source   : optional source label (e.g., "Report", "Dataset", "Tool docs")
#   doi      : optional DOI string
#   tags     : optional comma-separated keywords for filtering
#   note     : one-line description
# ============================================================

- type: resource
  section: guidance
  title: "Responsible AI Integration in Survey Research"
  org: "AAPOR"
  date: "2026-05-01"
  year: 2026
  link: "https://aapor.org/wp-content/uploads/2026/05/Responsible-AI-Integration-In-Survey-Research.pdf"
  note: "A practitioner-facing report on integrating AI responsibly across the survey lifecycle — design, data collection, analysis, transparency, and ethics."

- type: resource
  section: guidance
  title: "A reporting checklist for large language models in behavioural science"
  org: "Nature Human Behaviour"
  date: "2026-06-09"
  year: 2026
  link: "https://www.nature.com/articles/s41562-026-02492-7"
  checklist_link: "https://www.nature.com/articles/s41562-026-02492-7/tables/1"
  note: "Introduces GUIDE-LLM, a consensus reporting checklist for transparency, reproducibility, and ethical accountability in behavioural and social science studies involving LLMs."
