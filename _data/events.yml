# ============================================================
# EVENTS  (webinars, symposia/panels, short courses)
# ------------------------------------------------------------
# Chairs: add an event by copying a block below and editing it.
# Remove the `template: true` line once an entry is real — that
# line is what shows the dashed "Template" badge and hides the
# placeholder date.
#
# Fields:
#   type      : always "event"        (drives the Latest feed + badge)
#   kind      : webinar | symposium | course
#   title     : event title
#   date      : YYYY-MM-DD  (leave as "" for templates — do NOT
#               invent a realistic date for a placeholder)
#   status    : upcoming | past | template
#   speaker   : optional
#   location  : optional (e.g. "Online", "ESRA 2027, Utrecht")
#   link      : optional registration / recording URL
#   note      : one-line description
#   template  : true  -> shows as "Example — replace me"
# ============================================================

- type: event
  kind: webinar
  title: "Technical learnings from building AI into public surveys"
  date: "2026-06-11"
  status: upcoming
  speaker: "Steve Gibbard (ONS)"
  location: "Online"
  link: "https://teams.microsoft.com/meet/31773388529921?p=zegj6AfWAu0G6OUOG9"
  note: "A 12:00-13:00 online session on the architecture, challenges, and lessons from deploying AI-powered survey functionality in a public test environment."

- type: event
  kind: webinar
  title: "Example webinar — replace me"
  date: ""
  status: template
  speaker: ""
  location: "Online"
  link: ""
  note: "Replace with a real webinar: title, speaker, date, and a registration link."
  template: true

- type: event
