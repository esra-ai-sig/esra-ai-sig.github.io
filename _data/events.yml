# ============================================================
# EVENTS  (webinars, symposia/panels, short courses)
# ------------------------------------------------------------
# Chairs: add an event by copying a block below and editing it.
#
# Fields:
#   type      : always "event"        (drives the Latest feed + badge)
#   kind      : webinar | symposium | course
#   title     : event title
#   date      : YYYY-MM-DD
#   status    : upcoming | past
#   speaker   : optional
#   location  : optional (e.g. "Online", "ESRA 2027, Utrecht")
#   link      : optional registration / recording URL
#   note      : one-line description
# ============================================================

- type: event
  kind: course
  title: "AI for Survey Researchers: A three-workshop series"
  date: "2026-06-08"
  status: upcoming
  speaker: "Dr Paulo Serôdio"
  location: "Online"
  link: "https://www.ncrm.ac.uk/training/show.php?article=14796"
  note: "An NCRM online workshop series running on 8 June, 22 June, and 6 July 2026, covering LLMs, context engineering, API workflows, retrieval-augmented generation, agentic AI, and research transparency."

- type: event
  kind: webinar
  title: "Technical learnings from building AI into public surveys"
  date: "2026-06-11"
  status: upcoming
  speaker: "Steve Gibbard (ONS)"
  location: "Online"
  link: "https://teams.microsoft.com/meet/31773388529921?p=zegj6AfWAu0G6OUOG9"
